name: ImmortalWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable make menuconfig'
        required: true
        default: false
        type: boolean
      repo_url:
        description: 'Source repository URL'
        required: true
        default: 'https://github.com/mikamoe/immortalwrt-mt798x-rebase'
        type: string
      repo_branch:
        description: 'Source repository branch'
        required: true
        default: '25.12'
        type: string
      publish_release:
        description: 'Publish to Releases'
        required: true
        default: true
        type: boolean
      prerelease:
        description: 'Mark release as prerelease'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: write

env:
  REPO_URL: ${{ github.event.inputs.repo_url || 'https://github.com/mikamoe/immortalwrt-mt798x-rebase' }}
  REPO_BRANCH: ${{ github.event.inputs.repo_branch || '25.12' }}
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: cudy_tr3000-256mb-v1.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  menuconfig:
    name: Menuconfig & Push
    if: github.event.inputs.ssh == 'true'
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
        working-directory: /workdir

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v6

    - name: 🧰 Initialize build environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
          gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
          libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
          libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
          libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch \
          pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons \
          squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto \
          xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown "$USER:$USER" /workdir

    - name: 📦 Clone source code
      run: |
        df -hT "$PWD"
        git clone "$REPO_URL" -b "$REPO_BRANCH" openwrt
        ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

    - name: 🧩 Load custom feeds
      run: |
        [ -e "$GITHUB_WORKSPACE/$FEEDS_CONF" ] && mv "$GITHUB_WORKSPACE/$FEEDS_CONF" openwrt/feeds.conf.default
        [ -e "$GITHUB_WORKSPACE/$DIY_P1_SH" ] && chmod +x "$GITHUB_WORKSPACE/$DIY_P1_SH"
        cd openwrt
        [ -e "$GITHUB_WORKSPACE/$DIY_P1_SH" ] && "$GITHUB_WORKSPACE/$DIY_P1_SH"

    - name: 🔄 Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 📚 Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: ⚙️ Load custom configuration
      run: |
        [ -e "$GITHUB_WORKSPACE/files" ] && mv "$GITHUB_WORKSPACE/files" openwrt/files
        [ -e "$GITHUB_WORKSPACE/$CONFIG_FILE" ] && cp "$GITHUB_WORKSPACE/$CONFIG_FILE" openwrt/.config
        [ -e "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && chmod +x "$GITHUB_WORKSPACE/$DIY_P2_SH"
        cd openwrt
        [ -e "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && "$GITHUB_WORKSPACE/$DIY_P2_SH"
        make defconfig

    - name: 🔐 SSH connection to Actions
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 15

    - name: 💾 Save config and push
      run: |
        [ -e "openwrt/.config" ] || { echo "openwrt/.config not found"; exit 1; }
        cp openwrt/.config "$GITHUB_WORKSPACE/$CONFIG_FILE"

        cd "$GITHUB_WORKSPACE"
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add "$CONFIG_FILE"
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Update config: $CONFIG_FILE"
          git push origin HEAD:${GITHUB_REF_NAME}
        fi

  build:
    name: Build Firmware
    runs-on: ubuntu-22.04
    needs: menuconfig
    if: always() && (needs.menuconfig.result == 'success' || needs.menuconfig.result == 'skipped')

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v6

    - name: 🧰 Initialize build environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
          gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
          libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
          libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
          libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch \
          pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons \
          squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto \
          xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown "$USER:$USER" /workdir

    - name: 📦 Clone source code
      working-directory: /workdir
      run: |
        df -hT "$PWD"
        git clone "$REPO_URL" -b "$REPO_BRANCH" openwrt
        ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

    - name: 🧩 Load custom feeds
      run: |
        [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
        [ -e "$DIY_P1_SH" ] && chmod +x "$DIY_P1_SH"
        cd openwrt
        [ -e "$GITHUB_WORKSPACE/$DIY_P1_SH" ] && "$GITHUB_WORKSPACE/$DIY_P1_SH"

    - name: 🔄 Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 📚 Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: ⚙️ Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e "$CONFIG_FILE" ] && mv "$CONFIG_FILE" openwrt/.config
        [ -e "$DIY_P2_SH" ] && chmod +x "$DIY_P2_SH"
        cd openwrt
        [ -e "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && "$GITHUB_WORKSPACE/$DIY_P2_SH"

    - name: 📥 Download packages
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j"$(nproc)"
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 🏗️ Compile firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j"$(nproc)" || make -j1 || make -j1 V=s
        echo "status=success" >> "$GITHUB_OUTPUT"

        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME || true
        if [ -s DEVICE_NAME ]; then
          DEVICE_NAME_VALUE="$(cat DEVICE_NAME)"
          echo "DEVICE_NAME=_${DEVICE_NAME_VALUE}" >> "$GITHUB_ENV"
          echo "DEVICE_LABEL=${DEVICE_NAME_VALUE}" >> "$GITHUB_ENV"
        else
          echo "DEVICE_NAME=_unknown" >> "$GITHUB_ENV"
          echo "DEVICE_LABEL=unknown" >> "$GITHUB_ENV"
        fi

        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"
        echo "BUILD_TIME=$(date +"%Y-%m-%d %H:%M:%S %Z")" >> "$GITHUB_ENV"

        # Firmware Version
        VERSION_FILE="$(find bin/targets -type f -name 'version.buildinfo' | head -n 1)"
        if [ -n "$VERSION_FILE" ]; then
          FIRMWARE_VERSION="$(tr -d '\n' < "$VERSION_FILE" | sed 's/[[:space:]]*$//')"
        else
          FIRMWARE_VERSION="unknown"
        fi
        echo "FIRMWARE_VERSION=$FIRMWARE_VERSION" >> "$GITHUB_ENV"

        # Kernel Package Version
        KERNEL_PKG_FILE="$(find bin/targets -type f \( -name 'kernel_*.apk' -o -name 'kernel-*.apk' \) | head -n 1)"
        if [ -n "$KERNEL_PKG_FILE" ]; then
          KERNEL_PKG_VERSION="$(basename "$KERNEL_PKG_FILE" .apk)"
          KERNEL_PKG_VERSION="${KERNEL_PKG_VERSION#kernel_}"
          KERNEL_PKG_VERSION="${KERNEL_PKG_VERSION#kernel-}"
        else
          KERNEL_PKG_VERSION="unknown"
        fi
        echo "KERNEL_PKG_VERSION=$KERNEL_PKG_VERSION" >> "$GITHUB_ENV"

        echo "CONFIG_FILE_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/${CONFIG_FILE}" >> "$GITHUB_ENV"
        echo "BUILD_LOG_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_ENV"

    - name: 📊 Check space usage
      if: (!cancelled())
      run: df -hT

    - name: 🗂️ Organize firmware files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        FIRMWARE_DIR="$(find openwrt/bin/targets -type d -mindepth 2 -maxdepth 2 | head -n 1)"
        [ -n "$FIRMWARE_DIR" ] || exit 1
        cd "$FIRMWARE_DIR"
        rm -rf packages
        echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"

        SYSUPGRADE_FILE="$(find "$PWD" -type f -name '*sysupgrade*.bin' | head -n 1)"
        [ -n "$SYSUPGRADE_FILE" ] || { echo "No sysupgrade.bin found!"; exit 1; }

        echo "SYSUPGRADE_FILE=$SYSUPGRADE_FILE" >> "$GITHUB_ENV"
        echo "status=success" >> "$GITHUB_OUTPUT"

    - name: 📤 Upload firmware directory (artifact)
      uses: actions/upload-artifact@v7
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 🏷️ Generate release tag and notes
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && github.event.inputs.publish_release == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M%S")" >> "$GITHUB_OUTPUT"

        {
          echo "## ImmortalWrt Firmware Build"
          echo ""
          echo "This release provides the latest sysupgrade image and kernel module bundles for ${DEVICE_LABEL}."
          echo ""
          echo "### Build Information"
          echo "- Source Repository: [${REPO_URL}](${REPO_URL})"
          echo "- Source Branch: ${REPO_BRANCH}"
          echo "- Target Device: ${DEVICE_LABEL}"
          echo "- Firmware Version: ${FIRMWARE_VERSION}"
          echo "- Kernel Package Version: ${KERNEL_PKG_VERSION}"
          echo "- Build Time: ${BUILD_TIME}"
          echo "- Build Configuration: [View config file](${CONFIG_FILE_URL})"
          echo "- Build Log: [View workflow run](${BUILD_LOG_URL})"
          echo ""
          echo "### Included Assets"
          echo "- Sysupgrade firmware image"
        } > release.txt

        echo "status=success" >> "$GITHUB_OUTPUT"

    - name: 🚀 Upload sysupgrade firmware to release
      uses: softprops/action-gh-release@v3
      if: steps.tag.outputs.status == 'success' && github.event.inputs.publish_release == 'true' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.SYSUPGRADE_FILE }}
        prerelease: ${{ github.event.inputs.prerelease == 'true' }}

    - name: 🧹 Delete old workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 27
